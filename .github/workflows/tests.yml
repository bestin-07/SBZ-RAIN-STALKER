name: Logic integrity guard

# Runs the executable logic contract (CLAUDE.md → "Tests — the logic integrity guard")
# on every push / PR to main. A red X here means the rain-logic contract broke —
# check the commit before trusting the Railway deploy, and roll back by tag if needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend logic (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm install (not ci): tolerant of lockfiles written by a different npm major
      # on a different OS — this is a tripwire CI, robustness beats strictness here.
      - run: npm install --no-audit --no-fund
      - run: npm test

  backend:
    name: Backend logic (unittest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # test_logic.py extracts the functions from main.py via AST — no DB, no deps.
      - run: python backend/test_logic.py

  build:
    name: Frontend build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm install (not ci): tolerant of lockfiles written by a different npm major
      # on a different OS — this is a tripwire CI, robustness beats strictness here.
      - run: npm install --no-audit --no-fund
      - run: npm run build
