<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Accuracy · Admin</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0E0F11; color: #E7EAF0; font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    h1 { font-size: 1.1rem; letter-spacing: .15em; text-transform: uppercase; color: #9CA3AF; margin: 0 0 1.5rem; }
    h2 { font-size: .8rem; letter-spacing: .12em; text-transform: uppercase; color: #6B7280; margin: 2rem 0 .6rem; }
    input { width: 100%; max-width: 320px; background: #16181D; border: 1px solid #2A2E37; color: #E7EAF0; padding: .7rem .8rem; border-radius: 8px; font: inherit; }
    .hint { color: #6B7280; font-size: .8rem; margin-top: .6rem; }
    .err { color: #F87171; font-size: .85rem; margin-top: .8rem; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #1F2229; }
    th { color: #6B7280; font-weight: 400; font-size: .8rem; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .acc { font-weight: 700; }
    .good { color: #34D399; } .mid { color: #FBBF24; } .bad { color: #F87171; } .none { color: #6B7280; }
    .cards { display: flex; flex-wrap: wrap; gap: .75rem; }
    .card { background: #16181D; border: 1px solid #1F2229; border-radius: 10px; padding: .8rem 1rem; min-width: 110px; }
    .card .k { color: #6B7280; font-size: .75rem; } .card .v { font-size: 1.3rem; margin-top: .2rem; }
    .muted { color: #6B7280; font-size: .8rem; }
    a { color: #60A5FA; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Accuracy · Admin</h1>

    <div id="gate">
      <input id="key" type="password" placeholder="admin key, then Enter" autocomplete="off" autofocus />
      <div class="hint">Hidden dashboard. The key is checked on the server.</div>
      <div id="err" class="err" style="display:none"></div>
    </div>

    <div id="dash" style="display:none"></div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
