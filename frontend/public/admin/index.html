<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Accuracy · Admin</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0E0F11; color: #E7EAF0; font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    /* header */
    h1 { font-size: 1rem; letter-spacing: .18em; text-transform: uppercase; color: #6B7280; margin: 0 0 2rem; }
    h2 { font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: #4B5563; margin: 2.5rem 0 .75rem; border-top: 1px solid #1F2229; padding-top: 1.25rem; }

    /* gate */
    input { width: 100%; max-width: 320px; background: #16181D; border: 1px solid #2A2E37; color: #E7EAF0; padding: .7rem .9rem; border-radius: 8px; font: inherit; outline: none; }
    input:focus { border-color: #4B5563; }
    .hint { color: #4B5563; font-size: .78rem; margin-top: .6rem; }
    .err  { color: #F87171; font-size: .82rem; margin-top: .8rem; min-height: 1.2em; }

    /* summary cards */
    .cards { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: .25rem; }
    .card  { background: #13151A; border: 1px solid #1F2229; border-radius: 10px; padding: .85rem 1.1rem; min-width: 120px; }
    .card .k { color: #4B5563; font-size: .72rem; letter-spacing: .06em; text-transform: uppercase; }
    .card .v { font-size: 1.5rem; margin-top: .3rem; font-variant-numeric: tabular-nums; }

    /* tables */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th { color: #4B5563; font-weight: 400; font-size: .72rem; letter-spacing: .06em; text-transform: uppercase; padding: .4rem .75rem; text-align: left; border-bottom: 1px solid #1F2229; }
    thead th.r { text-align: right; }
    tbody tr { border-bottom: 1px solid #141519; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover td { background: #13151A; }
    td { padding: .55rem .75rem; vertical-align: middle; }
    td.r { text-align: right; }
    td.label { color: #9CA3AF; letter-spacing: .04em; }

    /* accuracy cell */
    .acc-wrap { display: flex; align-items: center; gap: .65rem; justify-content: flex-end; }
    .acc-pct  { font-weight: 700; font-size: .95rem; min-width: 3.2rem; text-align: right; }
    .bar-track { flex: 1; max-width: 80px; background: #1F2229; border-radius: 3px; height: 3px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 3px; }

    /* pills */
    .pill { display: inline-block; padding: .15rem .5rem; border-radius: 5px; font-size: .75rem; font-variant-numeric: tabular-nums; }
    .pill-0   { color: #374151; }
    .pill-red { background: rgba(248,113,113,.12); color: #F87171; }
    .pill-amb { background: rgba(251,191,36,.1);  color: #FBBF24; }

    /* color classes */
    .good { color: #34D399; } .mid { color: #FBBF24; } .bad { color: #F87171; } .none { color: #4B5563; }

    /* misc */
    .muted { color: #4B5563; font-size: .78rem; }
    .nodata { color: #374151; font-style: italic; }
    a { color: #60A5FA; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .actions { margin-top: 2.5rem; color: #4B5563; font-size: .8rem; }
    .actions a { color: #60A5FA; }

    /* ── gauges ───────────────────────────────────────────────────────── */
    .gauges      { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: .5rem 0 2rem; }
    .gauge-wrap  { display: flex; flex-direction: column; align-items: center; gap: .4rem; }
    .gauge-wrap svg circle.track { stroke: #1a1c22; }
    .gauge-wrap svg circle.arc   { transition: stroke-dashoffset 1.2s ease, stroke .4s; }
    .gauge-sub   { font-size: .7rem; color: #4B5563; letter-spacing: .06em; text-transform: uppercase; }

    /* calibration threshold table badges */
    .th-badge    { display: inline-block; padding: .12rem .45rem; border-radius: 4px;
                   font-size: .78rem; font-variant-numeric: tabular-nums;
                   background: rgba(96,165,250,.1); color: #60A5FA; }
    .th-raised   { background: rgba(251,191,36,.1);  color: #FBBF24; }
    .th-default  { background: rgba(75,85,99,.12);   color: #6B7280; }

    /* alert row */
    .alert-row   { display: flex; align-items: baseline; gap: .75rem;
                   padding: .45rem 0; border-bottom: 1px solid #141519;
                   font-size: .82rem; }
    .alert-row:last-child { border-bottom: none; }
    .alert-ts    { color: #4B5563; white-space: nowrap; flex-shrink: 0; }
    .alert-badge { padding: .1rem .4rem; border-radius: 4px; font-size: .72rem;
                   background: rgba(248,113,113,.1); color: #F87171; flex-shrink: 0; }
    .alert-txt   { color: #9CA3AF; }

    /* source health bars */
    .src-row   { display: flex; align-items: center; gap: .75rem; padding: .4rem 0;
                 border-bottom: 1px solid #141519; font-size: .82rem; }
    .src-row:last-child { border-bottom: none; }
    .src-name  { color: #9CA3AF; width: 7rem; flex-shrink: 0; }
    .src-track { flex: 1; height: 4px; background: #1F2229; border-radius: 3px; overflow: hidden; }
    .src-fill  { height: 100%; border-radius: 3px; background: #34D399; }
    .src-pct   { color: #4B5563; font-size: .75rem; width: 3.5rem; text-align: right; }

    /* metric context note */
    .metric-note { color: #4B5563; font-size: .75rem; letter-spacing: 0; text-transform: none;
                   font-weight: 400; margin: 0 0 .75rem; display: block; line-height: 1.5; }

    /* skill breakdown cards */
    .skill-card  { background: #0d0f13; border: 1px solid #1a1d24; border-radius: 10px;
                   padding: 1rem 1.1rem; margin-bottom: 1rem; }
    .skill-title { font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
                   color: #4B5563; margin-bottom: .75rem; }
    .skill-row   { display: flex; align-items: baseline; gap: .6rem; padding: .3rem 0;
                   border-bottom: 1px solid #13151a; font-size: .8rem; flex-wrap: wrap; }
    .skill-row:last-child { border-bottom: none; }
    .skill-label { color: #6B7280; flex: 1 1 14rem; }
    .skill-label em { color: #4B5563; font-style: normal; }
    .skill-val   { font-variant-numeric: tabular-nums; font-weight: 600;
                   color: #E7EAF0; white-space: nowrap; }
    .skill-note  { color: #374151; font-size: .72rem; flex: 1 1 100%; margin-left: 0; }
    .skill-divider { width: 100%; height: 1px; background: #1F2229; margin: .4rem 0; }
    .warn-note   { color: #FBBF24 !important; opacity: .6; }
    .muted-row .skill-val { color: #4B5563; }
    .hit-row  .skill-val  { color: #34D399; }
    .fa-row   .skill-val  { color: #F87171; }
    .miss-row .skill-val  { color: #FBBF24; }
    .skill-csi-row        { background: rgba(255,255,255,.015); margin: 0 -.5rem;
                            padding: .4rem .5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Accuracy · Admin</h1>

    <div id="gate">
      <input id="key" type="password" placeholder="admin key, then Enter" autocomplete="off" autofocus />
      <div class="hint">Key is verified server-side. Nothing is stored in the browser except this session.</div>
      <div id="err" class="err"></div>
    </div>

    <div id="dash" style="display:none"></div>
  </div>

  <script src="/admin/admin.js?v=6"></script>
</body>
</html>
